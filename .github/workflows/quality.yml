name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aliexpress-api/aliexpressapi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run pytest

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aliexpress-nuxt4
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: aliexpress-nuxt4/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test:run
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
